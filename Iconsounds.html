<!DOCTYPE html>
<html>
<head>
    <title>Audio Players</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            /* Set the Windows 7 photo as the background */
            background-image: url('DQ6fnyG.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 0 50px;
        }

        .side-img {
            max-width: 500px; /* Adjust size as needed */
            height: auto;
        }

        .player-content {
            background: rgba(255, 255, 255, 0.2); /* Slight glass effect */
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .button {
            padding: 15px 30px;
            background-color: #2AAA8A;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            margin: 10px auto;
            font-size: 1.2rem;
        }

        .button i { margin-right: 10px; }
        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Error image on the left -->
        <img src="Error.png" class="side-img" alt="Error">

        <!-- Center Audio Players -->
        <div class="player-content">
            <h1> BAM </h1>
            <button class="button" onclick="toggleSound('sound1', this)">
                <i class="fas fa-play"></i> PLAY
            </button>
            <audio id="sound1">
                <source src="bam.mp3" type="audio/mpeg">
            </audio>

            <br><br>

            <h1> DING </h1>
            <button class="button" onclick="toggleSound('sound2', this)">
                <i class="fas fa-play"></i> PLAY
            </button>
            <audio id="sound2">
                <source src="ding.mp3" type="audio/mpeg">
            </audio>
        </div>

        <!-- Question image on the right -->
        <img src="question.png" class="side-img" alt="Question">
    </div>

    <script>
        function toggleSound(audioId, btnElement) {
            var audio = document.getElementById(audioId);
            var icon = btnElement.querySelector("i");

            if (audio.paused) {
                audio.play();
                icon.className = "fas fa-pause";
            } else {
                audio.pause();
                audio.currentTime = 0;
                icon.className = "fas fa-play";
            }
        }
    </script>
</body>
</html>
